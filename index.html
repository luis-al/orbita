<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Orbita9</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#0a0a0a;
      min-height:100vh;

      display:flex;
      align-items:center;
      justify-content:center;

      padding:40px 20px;

      font-family:Arial, Helvetica, sans-serif;
    }
    /* ===== RETRO GRID BACKGROUND ===== */

.retro-grid{
  position:fixed;
  inset:0;
  z-index:-1;
  overflow:hidden;

  background:
    radial-gradient(circle at top, #111 0%, #000 70%);
}

/* Estrellas */
.retro-grid::before{
  content:"";

  position:absolute;
  inset:0;

  background-image:
    radial-gradient(white 1px, transparent 1px);

  background-size:4px 4px;
  opacity:0.15;

  animation:starsMove 120s linear infinite;
}

/* Grid neon */
.retro-grid::after{
  content:"";

  position:absolute;

  left:-50%;
  width:200%;
  height:120%;

  bottom:-35%;

  background-image:
    linear-gradient(rgba(166,255,0,0.9) 2px, transparent 2px),
    linear-gradient(90deg, rgba(166,255,0,0.9) 2px, transparent 2px);

  background-size:80px 80px;

  transform:
    perspective(800px)
    rotateX(78deg);

  transform-origin:bottom;

  animation:gridMove 10s linear infinite;

  box-shadow:
    0 0 25px rgba(166,255,0,0.5),
    0 0 80px rgba(255,0,90,0.15);

  filter:
    drop-shadow(0 0 8px rgba(166,255,0,0.8));
}

/* Glow horizonte */
body::before{
  content:"";

  position:fixed;

  left:0;
  right:0;
  bottom:38%;

  height:120px;

  background:
    linear-gradient(
      to bottom,
      rgba(255,0,90,0),
      rgba(255,0,90,0.8),
      rgba(255,0,90,0)
    );

  filter:blur(25px);

  z-index:-1;
}

/* Animaciones */

@keyframes gridMove{
  from{
    background-position:0 0, 0 0;
  }

  to{
    background-position:0 80px, 80px 0;
  }
}

@keyframes starsMove{
  from{
    transform:translateY(0);
  }

  to{
    transform:translateY(200px);
  }
}

    .container{
      width:100%;
      max-width:1100px;
    }

    .video-card{
      position:relative;

      width:100%;
      aspect-ratio:16 / 9;

      border-radius:24px;
      overflow:hidden;

      background:#000;

      box-shadow:
        0 0 40px rgba(0,0,0,0.5),
        0 0 80px rgba(80,80,255,0.08);

      border:1px solid rgba(255,255,255,0.06);
    }

    video{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .overlay{
      position:absolute;
      inset:0;

      background:linear-gradient(
        to bottom,
        rgba(0,0,0,0.1),
        rgba(0,0,0,0.4)
      );
    }

    .logo{
      position:absolute;
      bottom:24px;
      left:50%;
      transform:translateX(-50%);

      color:white;

      font-size:clamp(11px, 1vw, 15px);
      letter-spacing:0.35em;
      text-transform:uppercase;

      opacity:0.9;
    }

    @media (max-width:768px){

      body{
        padding:20px 14px;
      }

      .video-card{
        border-radius:18px;
      }

      .logo{
        bottom:18px;
        letter-spacing:0.25em;
      }
    }
  </style>
</head>

<body>
    <div class="retro-grid"></div>

  <div class="container">

    <div class="video-card">

      <!-- CAMBIA EL NOMBRE DEL VIDEO -->
      <video autoplay muted loop playsinline preload="auto">
        <source src="assets/orbita9-retro.mp4" type="video/mp4">
      </video>

      <div class="overlay"></div>

      <div class="logo">
        
      </div>

    </div>

  </div>

</body>
</html>
